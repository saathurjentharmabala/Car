<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Canvas Car Racer</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background: #333;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #ff4444;
        }
        button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
        }
        button:hover {
            background: #cc3333;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui">Score: <span id="scoreVal">0</span></div>
        <div id="gameOverScreen" id="gameOverScreen">
            <h1 style="color: #ff4444; margin: 0 0 10px 0;">GAME OVER</h1>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game Variables
let score = 0;
let gameOver = false;
let roadStripesY = 0;

// Player Car
const player = {
    x: 175,
    y: 480,
    width: 45,
    height: 80,
    speed: 6,
    color: "#0077ff"
};

// Enemy Cars
let enemies = [];
const enemySpeed = 5;
const enemyColors = ["#ff3333", "#ffaa00", "#00ff66", "#cc00ff"];

// Track Keyboard Inputs
const keys = {};
window.addEventListener("keydown", (e) => keys[e.code] = true);
window.addEventListener("keyup", (e) => keys[e.code] = false);

// Spawn an enemy car
function spawnEnemy() {
    // 3 Fixed lanes to make dodging structured
    const lanes = [65, 175, 285]; 
    const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
    
    // Check if lane is already crowded nearby
    if (enemies.length > 0 && Math.abs(enemies[enemies.length - 1].y) < 200) return;

    enemies.push({
        x: randomLane,
        y: -90,
        width: 45,
        height: 80,
        color: enemyColors[Math.floor(Math.random() * enemyColors.length)]
    });
}

// Draw a stylized car block
function drawCar(car, isPlayer = false) {
    // Main Body
    ctx.fillStyle = car.color;
    ctx.fillRect(car.x, car.y, car.width, car.height);
    
    // Wheels
    ctx.fillStyle = "#111";
    ctx.fillRect(car.x - 4, car.y + 10, 4, 15);  // Top Left
    ctx.fillRect(car.x + car.width, car.y + 10, 4, 15); // Top Right
    ctx.fillRect(car.x - 4, car.y + 55, 4, 15);  // Bottom Left
    ctx.fillRect(car.x + car.width, car.y + 55, 4, 15); // Bottom Right

    // Windshield
    ctx.fillStyle = isPlayer ? "#aaddff" : "#333";
    ctx.fillRect(car.x + 5, car.y + 20, car.width - 10, 15);
}

// Check Collision
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// Reset Game
function resetGame() {
    score = 0;
    enemies = [];
    player.x = 175;
    gameOver = false;
    document.getElementById("gameOverScreen").style.display = "none";
    document.getElementById("scoreVal").innerText = score;
    gameLoop();
}

// Main Game Loop
function gameLoop() {
    if (gameOver) return;

    // 1. Clear Canvas & Draw Background Road
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Green Grass Edges
    ctx.fillStyle = "#2e7d32";
    ctx.fillRect(0, 0, 40, canvas.height);
    ctx.fillRect(canvas.width - 40, 0, 40, canvas.height);

    // Moving Road Stripes
    ctx.fillStyle = "#fff";
    roadStripesY += enemySpeed;
    if (roadStripesY >= 40) roadStripesY = 0;
    
    for (let i = -40; i < canvas.height; i += 40) {
        ctx.fillRect(135, i + roadStripesY, 6, 20);
        ctx.fillRect(255, i + roadStripesY, 6, 20);
    }

    // 2. Handle Inputs & Move Player (Keep inside road boundaries)
    if ((keys["ArrowLeft"] || keys["KeyA"]) && player.x > 45) {
        player.x -= player.speed;
    }
    if ((keys["ArrowRight"] || keys["KeyD"]) && player.x < canvas.width - 45 - player.width) {
        player.x += player.speed;
    }

    // 3. Draw Player
    drawCar(player, true);

    // 4. Handle Enemies (Move, Draw, Collide)
    if (enemies.length === 0 || Math.random() < 0.02) {
        spawnEnemy();
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].y += enemySpeed;
        drawCar(enemies[i], false);

        // Collision Check
        if (checkCollision(player, enemies[i])) {
            gameOver = true;
            document.getElementById("finalScore").innerText = score;
            document.getElementById("gameOverScreen").style.display = "block";
        }

        // Score Point when passing enemy
        if (enemies[i].y > canvas.height) {
            enemies.splice(i, 1);
            score++;
            document.getElementById("scoreVal").innerText = score;
        }
    }

    requestAnimationFrame(gameLoop);
}

// Start Game initially
gameLoop();
</script>

</body>
</html>
